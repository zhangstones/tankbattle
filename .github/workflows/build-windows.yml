name: Build and Publish Windows GUI

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'
      
      - name: Build Windows GUI executable
        run: go build -ldflags="-H windowsgui" -o tankbattle_gui.exe .\cmd\tankbattle
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tankbattle-windows-gui
          path: tankbattle_gui.exe
      
      - name: Create and Upload Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: tankbattle_gui.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false