name: Build and Publish Windows GUI

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      
      - name: Build Windows GUI executable
        env:
          CGO_ENABLED: "0"
        run: go build -ldflags="-H windowsgui" -o tankbattle_gui.exe .\cmd\tankbattle
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tankbattle-windows-gui-${{ github.ref_name }}
          path: tankbattle_gui.exe
      
      - name: Publish release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: tankbattle_gui.exe
          generate_release_notes: true
