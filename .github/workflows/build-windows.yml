name: Build and Publish Windows GUI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.19'
      
      - name: Build Windows GUI executable
        run: go build -ldflags="-H windowsgui" -o tankbattle_gui.exe .\cmd\tankbattle
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: tankbattle-windows-gui
          path: tankbattle_gui.exe
      
      - name: Create Release
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: Tank Battle Windows GUI Build
          draft: false
          prerelease: false
